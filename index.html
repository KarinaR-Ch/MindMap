<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lidl Hellas Testing Mind Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
 font-family:Segoe UI, sans-serif;
 background:#020617;
 color:#fff;
 overflow:hidden;
}
svg{width:100vw;height:100vh;}

.node circle{
 fill:#0f172a;
 stroke-width:2px;
}
.node text{
 font-size:12px;
 fill:#fff;
}
.link{
 fill:none;
 stroke:#64748b;
 stroke-width:1.8px;
}
</style>
</head>

<body>
<svg id="map"></svg>

<script>
const data = {
name:"Lidl Hellas Testing",
children:[
{
name:"Testing Types",
children:[
{
name:"Functional Testing",
children:[
{name:"Homepage"},
{name:"Brochures"},
{name:"Lidl Plus"},
{name:"Promotions"},
{name:"Search"},
{name:"Cookies"}
]
},
{name:"UI/UX"},
{name:"Performance"},
{name:"Security"},
{name:"Compatibility"},
{name:"Usability"},
{name:"Localization"}
]
},
{
name:"Testing Methods",
children:[
{name:"Manual"},
{name:"Exploratory"},
{name:"Boundary Values"},
{name:"Equivalence"},
{name:"Pairwise"}
]
},
{
name:"Testing Levels",
children:[
{name:"Unit"},
{name:"Integration"},
{name:"System"},
{name:"Acceptance"}
]
},
{
name:"Application Specifics",
children:[
{name:"Web"},
{name:"High Load"},
{name:"Multilingual"},
{name:"Personal Data"},
{name:"Social Media"},
{name:"eCommerce"}
]
}
]
};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#map")
.append("g")
.attr("transform","translate(100,50)");

const root = d3.hierarchy(data);
const tree = d3.tree().size([height-100,width-200]);
tree(root);

// links
svg.selectAll(".link")
.data(root.links())
.enter()
.append("path")
.attr("class","link")
.attr("d", d3.linkHorizontal()
.x(d=>d.y)
.y(d=>d.x)
);

// nodes
const node = svg.selectAll(".node")
.data(root.descendants())
.enter()
.append("g")
.attr("class","node")
.attr("transform",d=>`translate(${d.y},${d.x})`);

node.append("circle")
.attr("r",8);

node.append("text")
.attr("dx",12)
.attr("dy",4)
.text(d=>d.data.name);

</script>
</body>
</html>
